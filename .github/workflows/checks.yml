name: Checks

on:
  push:
    branches: [main]

jobs:
  test-lint:
    name: Test and lint
    runs-on: ubuntu-24.04
    steps:
      - name: Login to Docker 
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test
        run: >
          docker compose -f docker-compose.ci.yml run --rm app sh -c "python manage.py test"

      - name: Run flake8
        run: docker compose -f docker-compose.ci.yml run --rm app flake8 app/
